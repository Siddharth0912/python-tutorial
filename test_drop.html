<!DOCTYPE html>
<html>
<head><title>Drag-Drop Test</title></head>
<body style="font-family:Arial;background:#111;color:#eee;padding:20px">

<h2>TEST: Can we drag-drop text into the PythonAnywhere console?</h2>
<p>Drag the green box below and drop it <b>directly onto the black terminal</b> at the bottom.</p>

<!-- Draggable element -->
<div id="drag" draggable="true"
  style="background:#48bb78;color:#000;padding:20px;display:inline-block;cursor:grab;border-radius:8px;font-weight:bold;margin:20px 0">
  🐍 DRAG ME onto the terminal below
</div>

<p id="status" style="color:#aaa">Status: waiting for drag...</p>

<!-- PythonAnywhere console - VISIBLE for testing -->
<div style="border:3px solid #e94560;margin-top:20px">
  <p style="background:#e94560;color:#fff;margin:0;padding:5px 10px;font-size:12px">
    ↓ PythonAnywhere Console (drop text here) ↓
  </p>
  <iframe
    src="https://www.pythonanywhere.com/embedded3/"
    style="width:100%;height:400px;border:none"
  ></iframe>
</div>

<script>
var drag = document.getElementById('drag');
var status = document.getElementById('status');

drag.addEventListener('dragstart', function(e) {
  // Set simple test text - just echo, nothing harmful
  e.dataTransfer.setData('text/plain', 'print("DRAG_DROP_WORKS")\n');
  e.dataTransfer.effectAllowed = 'copy';
  status.textContent = 'Status: dragging... now drop on the terminal';
  status.style.color = '#e2b93d';
});

drag.addEventListener('dragend', function(e) {
  status.textContent = 'Status: drag ended. Check if terminal shows DRAG_DROP_WORKS';
  status.style.color = '#48bb78';
});
</script>

</body>
</html>
